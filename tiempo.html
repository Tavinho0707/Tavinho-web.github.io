<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Tiempo ❤️</title>

    <link rel="stylesheet" href="tiempo.css">
</head>
<body>

<div class="stars"></div>

<a href="album.html" class="btn-volver" title="Volver">
    ←
</a>

<button id="musicBtn" class="music-btn">♫</button>

<audio id="bgMusic" loop>
    <source src="Musica/unayotravez.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <h1>❤️ Nuestro Tiempo</h1>

    <p class="frase" id="frase"></p>

    <div class="card">
        <h2>🌙 Nos conocimos hace</h2>

        <p class="fecha">
            📅 07 de Agosto de 2025 • 12:47 PM
        </p>

        <div class="contador-grid">

            <div class="box">
                <span id="c-anios">00</span>
                <small>Años</small>
            </div>

            <div class="box">
                <span id="c-meses">00</span>
                <small>Meses</small>
            </div>

            <div class="box">
                <span id="c-dias">00</span>
                <small>Días</small>
            </div>

            <div class="box">
                <span id="c-horas">00</span>
                <small>Horas</small>
            </div>

            <div class="box">
                <span id="c-minutos">00</span>
                <small>Minutos</small>
            </div>

            <div class="box">
                <span id="c-segundos">00</span>
                <small>Segundos</small>
            </div>

        </div>
    </div>

    <div class="card">
        <h2>💍 Somos novios hace</h2>

        <p class="fecha">
            📅 01 de Noviembre de 2025 • 10:02 PM
        </p>

        <div class="contador-grid">

            <div class="box">
                <span id="n-anios">00</span>
                <small>Años</small>
            </div>

            <div class="box">
                <span id="n-meses">00</span>
                <small>Meses</small>
            </div>

            <div class="box">
                <span id="n-dias">00</span>
                <small>Días</small>
            </div>

            <div class="box">
                <span id="n-horas">00</span>
                <small>Horas</small>
            </div>

            <div class="box">
                <span id="n-minutos">00</span>
                <small>Minutos</small>
            </div>

            <div class="box">
                <span id="n-segundos">00</span>
                <small>Segundos</small>
            </div>

        </div>
    </div>

</div>

<script src="tiempo.js"></script>

</body>
</html>
